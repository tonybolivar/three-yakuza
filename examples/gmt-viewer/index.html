<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Viewer — three-yakuza</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="ui">
      <h1>three-yakuza viewer</h1>
      <label>
        Common textures (tex_common_w64.par):
        <input type="file" id="common-input" accept=".par" />
      </label>
      <label>
        Load .par, .gmt, .gmd, or .glb (select multiple for texture PARs):
        <input type="file" id="file-input" accept=".gmt,.gmd,.par,.glb,.gltf" multiple />
      </label>
      <pre id="info">Load a .par (archive), .gmd (model), or .gmt (animation) file.</pre>
    </div>
    <canvas id="canvas"></canvas>

    <!-- Animation & Recording Panel (right side) -->
    <div id="anim-panel">
      <h2>Animation</h2>

      <div id="clip-list-container">
        <div id="clip-list-empty">No clips loaded</div>
        <ul id="clip-list"></ul>
      </div>

      <div id="transport">
        <button id="btn-play" title="Play / Pause">&#9654;</button>
        <button id="btn-stop" title="Stop (bind pose)">&#9632;</button>
        <span id="time-display">0.00 / 0.00</span>
      </div>

      <input type="range" id="scrubber" min="0" max="1" step="0.001" value="0" />

      <label id="speed-label">
        Speed:
        <select id="speed-select">
          <option value="0.25">0.25x</option>
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
        </select>
      </label>

      <h2>Export</h2>
      <div id="export-controls">
        <button id="btn-record">Record WebM</button>
        <button id="btn-png-seq">Export PNG Sequence</button>
        <div id="record-status"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
